<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tic Tac Toe Engine</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
			}

			body {
				font-family: monospace;
				font-size: 50px;
				min-height: 100vh;
			}

			#content {
				display: flex;
				justify-content: center;
				gap: 50px;
				place-items: center;
				padding-top: 20vh;
			}

			#board {
				display: grid;
				grid-template-columns: repeat(3, 80px);
				grid-template-rows: repeat(3, 80px);
			}

			#nav {
				font-size: 20px;
				text-align: center;
				margin-top: 30px;
			}

			.cell {
				box-sizing: border-box;
				border: 1px solid #000;
				width: 80px;
				height: 80px;
				display: flex;
				align-items: center;
				justify-content: center;
			}
		</style>
	</head>
	<body>
		<div id="content">
			<div id="board" aria-label="tic tac toe board">
				<div class="cell" data-index="0"></div>
				<div class="cell" data-index="1"></div>
				<div class="cell" data-index="2"></div>
				<div class="cell" data-index="3"></div>
				<div class="cell" data-index="4"></div>
				<div class="cell" data-index="5"></div>
				<div class="cell" data-index="6"></div>
				<div class="cell" data-index="7"></div>
				<div class="cell" data-index="8"></div>
			</div>
			<div>
				<div id="end-msg" style="display: none">
					Game has ended.<br />
					<div onclick="window.location.reload()"><u>New?</u></div>
				</div>
			</div>
		</div>
		<div id="nav">
			<a href="play-human.html">You vs Human (Offline)</a> (You are here) | <a href="play-bot.html">You vs Bot</a> |
			<a href="analysis.html">Analysis + Evaluation</a>
		</div>
		<script src="./main.js"></script>
		<script>
			initializeBoard();
		</script>
	</body>
</html>
