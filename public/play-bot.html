<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tic Tac Toe Engine</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<div id="content">
			<div id="board" aria-label="tic tac toe board">
				<div class="cell" data-index="0"></div>
				<div class="cell" data-index="1"></div>
				<div class="cell" data-index="2"></div>
				<div class="cell" data-index="3"></div>
				<div class="cell" data-index="4"></div>
				<div class="cell" data-index="5"></div>
				<div class="cell" data-index="6"></div>
				<div class="cell" data-index="7"></div>
				<div class="cell" data-index="8"></div>
			</div>
			<div class="sidebar">
				<div class="status-line">
					<span>Bot is</span>
					<span id="bot-type">O</span>
					<span>.</span>
					<button id="bot-switch-type" class="link-button" type="button">Switch</button>
				</div>
				<div id="lose-msg" class="hidden">You will lose.</div>
				<div id="end-msg" class="hidden">
					Game has ended.<br />
					<div onclick="window.location.reload()" class="action-link"><u>New?</u></div>
				</div>
			</div>
		</div>
		<div class="bottom-nav">
			<div class="nav-links">
				<a href="play-human.html">You vs Human (Offline)</a>
				<a href="play-bot.html">You vs Bot (You are here)</a>
				<a href="analysis.html">Analysis + Evaluation</a>
			</div>
		</div>
		<script src="./main.js"></script>
		<script>
			initializeBoard();
		</script>
	</body>
</html>
